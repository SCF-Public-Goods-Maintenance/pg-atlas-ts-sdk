name: Manual Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Do dry-run? (true/false)"
        required: true
        default: "true"

permissions:
  id-token: write
  contents: write

jobs:
  release:
    name: 🚀 Release package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update to latest openapi.json
        run: pnpm run update

      - name: Rewrite tests for regenerated SDK
        run: pnpm run rewrite-tests

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VER=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit release bump
        run: |
          V=${{ steps.get_version.outputs.VER }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "prepare release $V"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "⏭ nothing to commit, continuing…"
          fi

      - name: Create & push tag
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          V=${{ steps.get_version.outputs.VER }}
          git tag -a "v$V" -m "Release v$V"
          git push origin "v$V"

      - name: Publish to npm
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "false" ]; then
            echo "=== REAL PUBLISH ==="
            # --provenance links this build to this GitHub Action run
            pnpm publish --access public --provenance --no-git-checks
          else
            echo "=== DRY RUN ==="
            pnpm publish --dry-run --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
