name: Manual Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Do dry-run? (true/false)"
        required: true
        default: "true"

jobs:
  release:
    name: 🚀 Release package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/create-github-app-token@v3.1.1
        id: app-token
        with:
          client-id: ${{ vars.GH_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_RELEASE_APP_PRIVATE_KEY }}

      - name: Get Release App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Configure git operations as bot
        run: |
          gh auth setup-git
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update to latest openapi.json
        run: pnpm run update

      - name: Rewrite tests for regenerated SDK
        run: pnpm run rewrite-tests

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VER=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit release bump
        run: |
          V=${{ steps.get_version.outputs.VER }}
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "prepare release $V"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "⏭ nothing to commit, continuing…"
          fi

      - name: Create & push tag
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          V=${{ steps.get_version.outputs.VER }}
          git tag -a "v$V" -m "Release v$V"
          git push origin "v$V"

      - name: Publish to npm
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "false" ]; then
            echo "=== REAL PUBLISH ==="
            # --provenance links this build to this GitHub Action run
            pnpm publish --access public --provenance --no-git-checks
          else
            echo "=== DRY RUN ==="
            pnpm publish --dry-run --access public --no-git-checks
          fi
